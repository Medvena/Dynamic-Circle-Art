<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generative Art</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ui">
    <div id="controls">
        <h2>Controls</h2>

        <label>Circles</label>
        <input type="range" id="count" min="10" max="1000" value="200">

        <label>Size</label>
        <input type="range" id="size" min="1" max="200" value="40">

        <label>Opacity</label>
        <input type="range" id="opacity" min="0" max="1" step=".01" value="1">

        <label for="speed">Speed:</label>
        <input type="range" id="speed" min="0" max="10" step="0.1" value="3">

        <label>Trail:</label>
        <input type="range" id="trail" min="0" max="0.5" step="0.001" value="0">

        <label>Palette :</label>
        <select id="paletteSelect">
            <option value="cyberpunk">Cyberpunk</option>
            <option value="pastel">Pastel</option>
            <option value="noirblanc">Black & White</option>
        </select>

        <button id="refresh">Generate</button>

        <p>A small interactive experiment with spheres. Change the parameters and see what happens! You can also resize the window.</p>
        <img src="logo.png" alt="Logo" id="logo">

    </div>


    <div id="canvasContainer">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script src="art.js"></script>
</body>
</html>
